name = "torneigen-api"
main = "src/index.ts"
compatibility_date = "2026-01-01"

# Il namespace KV va creato al deploy: `wrangler kv namespace create KV`
# e incollato l'id qui sotto. Il secret READ_TOKEN si imposta con:
# `wrangler secret put READ_TOKEN`
[[kv_namespaces]]
binding = "KV"
id = "b829e5cefba14ce4bc75776f4fc30847"

# D1 per lo store dell'organizzazione (multi-organizzatore).
# Crea il DB una volta: `wrangler d1 create torneigen-org` e incolla il database_id qui sotto.
# Applica lo schema: `wrangler d1 execute torneigen-org --file=schema.sql --remote`
# Imposta il token di scrittura: `wrangler secret put WRITE_TOKEN`
[[d1_databases]]
binding = "DB"
database_name = "torneigen-org"
database_id = "25a6d584-53b8-491e-8562-45251fcee7cc"

# Email dell'admin abilitato di default (bypassa l'approvazione manuale).
# AUTH_SECRET (HMAC per i JWT di sessione) e' un secret: `wrangler secret put AUTH_SECRET`.
[vars]
ADMIN_EMAIL = "nicola.hdr@gmail.com"
